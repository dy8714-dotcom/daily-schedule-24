<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>毎日日程表２４ v6.2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://accounts.google.com/gsi/client"></script>
    <style>
        :root {
            --bg:#f0f2f5;--surface:#fff;--surface-alt:#f8f9fb;--accent:#2563eb;--accent-hover:#1d4ed8;
            --accent-light:#dbeafe;--accent-glow:rgba(37,99,235,0.12);--text:#1e293b;--text-muted:#64748b;
            --border:#e2e8f0;--border-strong:#cbd5e1;--danger:#ef4444;--success:#22c55e;--warning:#f59e0b;
            --shadow-sm:0 1px 3px rgba(0,0,0,0.06);--shadow-lg:0 12px 40px rgba(0,0,0,0.12);
            --shadow-xl:0 20px 60px rgba(0,0,0,0.15);--radius:10px;--radius-lg:14px;
            --font-body:'Noto Sans JP',sans-serif;--font-mono:'JetBrains Mono',monospace;
            --font-size:13px;--transition:0.25s cubic-bezier(0.4,0,0.2,1);--sidebar-w:340px;
        }
        *{box-sizing:border-box;margin:0;padding:0}
        body{background:var(--bg);font-family:var(--font-body);font-size:var(--font-size);color:var(--text);line-height:1.6;overflow-x:hidden;min-height:100vh}

        #login-overlay{position:fixed;inset:0;background:linear-gradient(135deg,#1e293b 0%,#0f172a 50%,#1e3a5f 100%);z-index:9999;display:flex;flex-direction:column;justify-content:center;align-items:center;color:#fff}
        .login-box{text-align:center;animation:fadeUp .8s ease-out}
        @keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
        .login-title{font-size:28px;font-weight:900;letter-spacing:2px;margin-bottom:6px}
        .login-subtitle{font-size:13px;color:rgba(255,255,255,.5);margin-bottom:32px;font-family:var(--font-mono)}
        .login-field{display:flex;gap:8px;justify-content:center}
        .login-field input{padding:14px 20px;font-size:16px;border-radius:var(--radius);border:2px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:#fff;width:220px;font-family:var(--font-mono);outline:none}
        .login-field input::placeholder{color:rgba(255,255,255,.35)}
        .login-field input:focus{border-color:var(--accent)}
        .login-field button{padding:14px 28px;font-size:15px;font-weight:700;border-radius:var(--radius);border:none;background:var(--accent);color:#fff;cursor:pointer}

        .app-shell{display:flex;gap:10px;max-width:1500px;margin:0 auto;padding:12px;align-items:flex-start}
        .sidebar{width:var(--sidebar-w);flex-shrink:0;position:sticky;top:12px;display:flex;flex-direction:column;gap:8px}
        .main-content{flex:1;min-width:0}

        /* Google Auth Button */
        .gcal-auth-box{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:12px;box-shadow:var(--shadow-sm)}
        .gcal-auth-title{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;display:flex;align-items:center;gap:4px}
        .gcal-login-btn{width:100%;padding:10px;border:1.5px solid var(--border-strong);border-radius:8px;background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-size:13px;font-weight:700;color:var(--text);transition:var(--transition)}
        .gcal-login-btn:hover{border-color:var(--accent);background:var(--accent-light)}
        .gcal-login-btn img{width:18px;height:18px}
        .gcal-user-info{font-size:11px;color:var(--text-muted);margin-top:6px;text-align:center}
        .gcal-user-info .email{font-weight:700;color:var(--accent)}
        .gcal-logout-btn{font-size:10px;color:var(--danger);cursor:pointer;text-decoration:underline;border:none;background:none;margin-top:4px}

        /* Sidebar Calendar Events */
        .sidebar-events{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:10px;box-shadow:var(--shadow-sm);max-height:500px;overflow-y:auto}
        .sidebar-events-title{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
        .sidebar-events-title button{font-size:10px;padding:2px 8px;border:1px solid var(--border);border-radius:4px;background:var(--surface-alt);cursor:pointer;font-weight:600;color:var(--text-muted)}
        .sidebar-events-title button:hover{border-color:var(--accent);color:var(--accent)}
        .gcal-month-label{font-size:12px;font-weight:800;color:var(--text);padding:6px 0 4px;border-bottom:1px solid var(--border);margin-bottom:4px;font-family:var(--font-mono)}
        .gcal-day-group{margin-bottom:6px}
        .gcal-day-label{font-size:10px;font-weight:700;color:var(--text-muted);padding:2px 0;font-family:var(--font-mono)}
        .gcal-event{font-size:11px;padding:4px 8px;border-radius:5px;margin-bottom:2px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;transition:var(--transition)}
        .gcal-event:hover{opacity:.85;transform:translateX(2px)}
        .gcal-event.allday{background:#16a34a}
        .gcal-event.timed{background:var(--accent)}
        .gcal-no-events{font-size:11px;color:var(--text-muted);padding:8px;text-align:center;font-style:italic}

        /* Import button */
        .gcal-import-bar{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:8px;text-align:center;box-shadow:var(--shadow-sm)}
        .gcal-import-btn{width:100%;padding:8px;border:none;border-radius:8px;background:var(--accent);color:#fff;font-weight:700;font-size:12px;cursor:pointer;transition:var(--transition)}
        .gcal-import-btn:hover{background:var(--accent-hover)}

        /* Mini calendar fallback */
        .mini-cal{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow-sm);padding:12px}
        .mini-cal-header{text-align:center;font-weight:800;font-size:14px;margin-bottom:8px;font-family:var(--font-mono)}
        .mini-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center}
        .mini-cal-dow{font-size:11px;font-weight:700;color:var(--text-muted);padding:4px 0}
        .mini-cal-dow.sun{color:var(--danger)}.mini-cal-dow.sat{color:var(--accent)}
        .mini-cal-day{font-size:13px;font-weight:600;padding:5px 0;border-radius:6px;cursor:pointer;transition:var(--transition);font-family:var(--font-mono);position:relative}
        .mini-cal-day:hover{background:var(--accent-light)}
        .mini-cal-day.today{background:var(--accent);color:#fff;font-weight:800}
        .mini-cal-day.selected{outline:2px solid var(--accent);outline-offset:-1px}
        .mini-cal-day.other-month{color:#cbd5e1}
        .mini-cal-day.sun-day{color:var(--danger)}.mini-cal-day.sat-day{color:var(--accent)}
        .mini-cal-day.today.sun-day,.mini-cal-day.today.sat-day{color:#fff}
        .mini-cal-day.has-event::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:var(--accent)}
        .mini-cal-day.today.has-event::after{background:#fff}

        .sidebar-sync{font-size:10px;text-align:center;padding:5px;border-radius:6px;background:var(--surface);border:1px solid var(--border);font-weight:600}
        .sidebar-sync.online{color:var(--success)}.sidebar-sync.offline{color:var(--warning)}

        .autosave-indicator{position:fixed;top:12px;right:12px;background:var(--success);color:#fff;font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;z-index:8000;opacity:0;transition:opacity .3s;box-shadow:0 2px 8px rgba(34,197,94,.4)}
        .autosave-indicator.show{opacity:1}

        header{display:flex;justify-content:space-between;align-items:center;background:var(--surface);padding:10px 16px;border-radius:var(--radius-lg);margin-bottom:10px;box-shadow:var(--shadow-sm);border:1px solid var(--border);flex-wrap:wrap;gap:8px}
        .header-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
        .app-title{font-size:18px;font-weight:900;color:var(--accent);display:flex;align-items:center;gap:6px;white-space:nowrap}
        .app-title .icon{font-size:22px}
        #calendar-picker{padding:6px 10px;border:1.5px solid var(--border-strong);border-radius:8px;font-size:13px;font-family:var(--font-mono);font-weight:600;color:var(--text);background:var(--surface-alt);cursor:pointer}
        #calendar-picker:focus{border-color:var(--accent);outline:none}
        #current-day-badge{background:var(--accent);color:#fff;padding:3px 14px;border-radius:20px;font-weight:700;font-size:12px;font-family:var(--font-mono)}
        .header-actions{display:flex;gap:6px;flex-wrap:wrap}

        .btn{border:1.5px solid var(--border-strong);padding:7px 14px;border-radius:8px;cursor:pointer;font-size:12px;background:var(--surface);font-weight:600;color:var(--text);transition:var(--transition);display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
        .btn:hover{background:var(--surface-alt);transform:translateY(-1px)}.btn:active{transform:translateY(0)}
        .btn-primary{background:var(--accent);color:#fff;border:none;box-shadow:0 2px 8px rgba(37,99,235,.3)}
        .btn-primary:hover{background:var(--accent-hover)}
        .btn-danger{color:var(--danger);border-color:var(--danger)}.btn-danger:hover{background:#fef2f2}

        .date-tabs{display:grid;grid-template-columns:repeat(10,1fr);gap:4px;margin-bottom:10px}
        .date-btn{background:var(--surface);border:1.5px solid var(--border);padding:8px 4px;text-align:center;cursor:pointer;border-radius:8px;font-weight:600;font-size:12px;transition:var(--transition);line-height:1.3}
        .date-btn:hover{border-color:var(--accent);background:var(--accent-light)}
        .date-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
        .date-btn .weekday{font-size:10px;color:var(--text-muted);display:block}.date-btn.active .weekday{color:rgba(255,255,255,.8)}
        .date-btn .day-num{font-size:15px;font-family:var(--font-mono)}
        .date-btn.sun{color:var(--danger)}.date-btn.sat{color:var(--accent)}.date-btn.active.sun,.date-btn.active.sat{color:#fff}

        .todo-section{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;background:var(--surface);padding:12px;border-radius:var(--radius-lg);margin-bottom:10px;box-shadow:var(--shadow-sm);border:1px solid var(--border)}
        .todo-section-title{grid-column:1/-1;font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.5px;padding-bottom:4px;border-bottom:1px solid var(--border);margin-bottom:4px}
        .todo-card{border:1.5px solid var(--border);padding:8px;border-radius:8px;display:flex;align-items:center;gap:6px;background:var(--surface);position:relative;transition:var(--transition);cursor:grab}
        .todo-card:hover{border-color:var(--accent);box-shadow:var(--shadow-sm)}
        .todo-card.is-finished{background:var(--surface-alt)!important;opacity:.5}.todo-card.is-finished .t-text{text-decoration:line-through}
        .todo-card .t-check{width:18px;height:18px;cursor:pointer;accent-color:var(--accent);flex-shrink:0}
        .todo-card .t-text{flex:1;border:none;outline:none;font-weight:600;font-size:12px;color:var(--text);background:transparent;min-width:0;font-family:var(--font-body)}
        .todo-card .t-time{width:42px;border:1.5px solid var(--border);border-radius:5px;text-align:center;padding:3px;font-size:11px;font-family:var(--font-mono);font-weight:600;color:var(--text-muted);background:var(--surface-alt)}
        .todo-color-dot{width:22px;height:22px;border-radius:6px;border:2px solid rgba(0,0,0,.15);cursor:pointer;flex-shrink:0}
        .todo-palette-popup{display:none;position:absolute;top:40px;left:0;width:155px;background:var(--surface);border:1.5px solid var(--border-strong);border-radius:var(--radius);padding:8px;grid-template-columns:repeat(5,1fr);gap:5px;z-index:5000;box-shadow:var(--shadow-lg)}
        .mini-color-dot{width:24px;height:24px;border-radius:5px;cursor:pointer;border:2px solid transparent}.mini-color-dot:hover{transform:scale(1.15);border-color:var(--text)}
        .todo-finish-btn{padding:3px 8px;font-size:10px;font-weight:700;border-radius:5px;border:1.5px solid var(--border-strong);background:var(--surface-alt);cursor:pointer;color:var(--text-muted)}
        .todo-finish-btn:hover{background:var(--success);color:#fff;border-color:var(--success)}

        .timeline-wrapper{background:var(--surface);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:10px;box-shadow:var(--shadow-sm);border:1px solid var(--border)}
        .part-header{background:#334155;color:#fff;padding:10px 14px;cursor:pointer;font-weight:700;font-size:13px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,.1);user-select:none}
        .part-header:hover{background:#475569}
        .part-header .toggle-icon{font-size:11px;background:rgba(255,255,255,.15);padding:2px 10px;border-radius:12px}
        .part-header.collapsed .toggle-icon{background:rgba(255,255,255,.08)}

        .minute-header-row{display:grid;grid-template-columns:60px 1fr;background:var(--surface-alt);border-bottom:2px solid var(--border-strong);height:24px}
        .minute-header-row.collapsed{display:none}
        .minute-header-label{background:#e2e8f0;text-align:center;font-size:9px;font-weight:700;color:var(--text-muted);display:flex;align-items:center;justify-content:center;border-right:2px solid var(--border)}
        .minute-header-cells{display:grid;grid-template-columns:repeat(12,1fr);height:100%}
        .minute-header-cell{text-align:center;font-size:9px;font-weight:700;font-family:var(--font-mono);color:var(--text-muted);display:flex;align-items:center;justify-content:center;border-right:1px solid #eee}
        .minute-header-cell:nth-child(3n){border-right:1.5px solid var(--border-strong)}
        .minute-header-cell:nth-child(6n){border-right:2.5px solid #94a3b8;background:rgba(37,99,235,.04)}

        .time-row{display:grid;grid-template-columns:60px 1fr;border-bottom:1px solid var(--border);height:60px;position:relative}
        .time-row:hover{background:var(--accent-glow)}.time-row.collapsed{display:none}
        .time-row.current-hour{background:rgba(37,99,235,.06)}
        .hour-label{background:var(--surface-alt);text-align:center;display:flex;flex-direction:column;justify-content:center;align-items:center;font-weight:700;font-size:15px;border-right:2px solid var(--border);font-family:var(--font-mono)}
        .hour-label .hour-sub{font-size:9px;color:var(--text-muted);font-weight:500}
        .time-row.current-hour .hour-label{background:var(--accent);color:#fff}
        .time-row.current-hour .hour-label .hour-sub{color:rgba(255,255,255,.7)}

        .minute-cells{display:grid;grid-template-columns:repeat(12,1fr);height:100%;position:relative}
        .cell{border-right:1px solid #eee;height:100%;cursor:cell;z-index:1;position:relative}
        .cell:nth-child(3n){border-right:1.5px solid var(--border-strong)}
        .cell:nth-child(6n){border-right:2.5px solid #94a3b8}
        .cell:hover{background:rgba(37,99,235,.08)}
        .cell .cell-top,.cell .cell-bottom{position:absolute;left:0;right:0;height:50%;z-index:2}
        .cell .cell-top{top:0}.cell .cell-bottom{bottom:0}
        .cell .cell-bottom:hover{background:rgba(37,99,235,.1);border-top:1px dashed rgba(37,99,235,.3)}

        .current-time-line{position:absolute;top:0;bottom:0;width:2px;background:var(--danger);z-index:50;box-shadow:0 0 6px rgba(239,68,68,.5)}
        .current-time-line::before{content:'';position:absolute;top:-4px;left:-4px;width:10px;height:10px;border-radius:50%;background:var(--danger)}
        .cell.past-cell{background:rgba(100,116,139,0.22)}
        .time-row.past-row .minute-cells{background:rgba(100,116,139,0.18)}
        .time-row.past-row .hour-label{color:var(--text-muted);opacity:.55}

        /* View Tabs */
        .view-tabs{display:flex;gap:4px;margin-bottom:10px}
        .view-tab{flex:1;padding:8px;text-align:center;font-weight:700;font-size:13px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;background:var(--surface);color:var(--text);transition:var(--transition)}
        .view-tab:hover{border-color:var(--accent);background:var(--accent-light)}
        .view-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
        .view-content{display:none}.view-content.active{display:block}

        /* Template Palette */
        .template-section{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);padding:10px;margin-bottom:10px;box-shadow:var(--shadow-sm)}
        .template-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
        .template-header span{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
        .template-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px}
        .tpl-card{border:1.5px solid var(--border);border-radius:6px;padding:5px 4px;text-align:center;cursor:grab;transition:var(--transition);font-size:10px;font-weight:700;color:#fff;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;min-height:36px;display:flex;flex-direction:column;justify-content:center;align-items:center}
        .tpl-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-sm)}
        .tpl-card.empty{background:var(--surface-alt);color:var(--text-muted);border-style:dashed;cursor:pointer;font-size:18px}
        .tpl-card .tpl-dur{font-size:8px;opacity:.8;margin-top:1px}
        .tpl-save-btn{padding:3px 8px;font-size:10px;font-weight:700;border:1px solid var(--accent);border-radius:4px;background:var(--accent-light);color:var(--accent);cursor:pointer}
        .tpl-save-btn:hover{background:var(--accent);color:#fff}

        /* Weekly View */
        .weekly-wrapper{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);box-shadow:var(--shadow-sm);overflow-x:auto;padding:8px}
        .weekly-grid{display:grid;grid-template-columns:40px repeat(7,1fr);gap:0;min-width:700px}
        .weekly-day-header{text-align:center;font-size:11px;font-weight:800;padding:6px 2px;border-bottom:2px solid var(--border);font-family:var(--font-mono)}
        .weekly-day-header.today-col{background:var(--accent-light);color:var(--accent);border-radius:6px 6px 0 0}
        .weekly-hour-label{font-size:10px;font-weight:700;font-family:var(--font-mono);color:var(--text-muted);text-align:right;padding:0 4px;height:28px;display:flex;align-items:center;justify-content:flex-end;border-right:1px solid var(--border)}
        .weekly-cell{height:28px;border-bottom:1px solid #f1f5f9;border-right:1px solid #f1f5f9;position:relative;cursor:pointer}
        .weekly-cell:hover{background:var(--accent-glow)}
        .weekly-cell.today-col{background:rgba(37,99,235,0.03)}
        .weekly-block{position:absolute;left:1px;right:1px;border-radius:3px;font-size:8px;font-weight:700;color:#fff;padding:0 3px;overflow:hidden;white-space:nowrap;z-index:2;cursor:pointer}
        .weekly-block:hover{opacity:.85}

        .act-block{position:absolute;border-radius:5px;color:#fff;font-weight:700;font-size:11px;padding:2px 8px;overflow:hidden;white-space:nowrap;cursor:pointer;z-index:10;box-shadow:0 2px 6px rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.2);line-height:1.4}
        .act-block:hover{box-shadow:0 4px 12px rgba(0,0,0,.35);z-index:15}
        .act-block.gcal-block{border:2px dashed rgba(255,255,255,.5);opacity:.85}

        .bottom-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
        .info-panel{background:var(--surface);padding:14px;border-radius:var(--radius-lg);border:1px solid var(--border);box-shadow:var(--shadow-sm)}
        .info-panel-title{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px}
        .info-panel textarea{width:100%;height:180px;border:1.5px solid var(--border);border-radius:8px;padding:12px;font-size:14px;resize:vertical;font-weight:500;font-family:var(--font-body);color:var(--text);background:var(--surface-alt);line-height:1.7}
        .info-panel textarea:focus{border-color:var(--accent);outline:none;box-shadow:0 0 0 3px var(--accent-glow)}
        .notice-row{display:flex;gap:6px;margin-bottom:6px;align-items:center}
        .notice-row .notice-num{font-size:10px;font-weight:800;color:var(--text-muted);width:18px;text-align:center;flex-shrink:0;font-family:var(--font-mono)}
        .notice-row input{flex:1;border:1.5px solid var(--border);border-radius:6px;padding:7px 10px;font-size:13px;font-family:var(--font-body);color:var(--text);background:var(--surface-alt);font-weight:500}
        .notice-row input:focus{border-color:var(--accent);outline:none}
        .notice-copy-btn{padding:4px 8px;font-size:9px;font-weight:700;border-radius:5px;border:1px solid var(--border-strong);background:var(--surface-alt);cursor:pointer;color:var(--text-muted);white-space:nowrap;transition:var(--transition)}
        .notice-copy-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}

<script>
// ================================================================
//  ★ 設定値 — セットアップガイドの値をここに貼り付け ★
// ================================================================
const GOOGLE_CLIENT_ID = '565432303593-c3qmdsa04tu6s2g6m23dt8p1qj6iktjj.apps.googleusercontent.com';
const FIREBASE_CONFIG = {
    apiKey:"AIzaSyC0p_G4iYkRySYAljykuab4txQSiYSbSgY",
    authDomain:"dailyschedule24-31d0a.firebaseapp.com",
    projectId:"dailyschedule24-31d0a",
    storageBucket:"dailyschedule24-31d0a.firebasestorage.app",
    messagingSenderId:"342364924902",
    appId:"1:342364924902:web:28f69ee243ab35af010427"
};

// ================================================================
//  Google Calendar API (OAuth + Calendar v3)
// ================================================================
let gcalAccessToken = null;
let gcalEvents = [];  // 取得済みイベント
let tokenClient = null;

function initGoogleAuth() {
    if (GOOGLE_CLIENT_ID.startsWith('YOUR_')) return;
    try {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: GOOGLE_CLIENT_ID,
            scope: 'https://www.googleapis.com/auth/calendar.readonly https://www.googleapis.com/auth/calendar.events',
            callback: handleGoogleToken,
        });
    } catch(e) { console.warn('Google OAuth init failed:', e); }
}

function googleLogin() {
    if (!tokenClient) {
        if (GOOGLE_CLIENT_ID.startsWith('YOUR_')) {
            showToast('⚠️ Google Client IDを設定してください', 3000);
        } else {
            showToast('⚠️ Google認証の初期化に失敗しました', 3000);
        }
        return;
    }
    tokenClient.requestAccessToken();
}

function handleGoogleToken(resp) {
    if (resp.error) { showToast('⚠️ Google認証エラー: ' + resp.error); return; }
    gcalAccessToken = resp.access_token;
    // ユーザー情報を取得
    fetch('https://www.googleapis.com/oauth2/v2/userinfo', {
        headers: { Authorization: 'Bearer ' + gcalAccessToken }
    }).then(r => r.json()).then(info => {
        document.getElementById('gcal-auth-content').style.display = 'none';
        document.getElementById('gcal-user-display').style.display = 'block';
        document.getElementById('gcal-email-display').textContent = info.email || 'Connected';
        document.getElementById('gcal-events-panel').style.display = 'block';
        document.getElementById('gcal-import-bar').style.display = 'block';
        fetchGoogleCalendar();
        showToast('✅ Googleカレンダーに接続しました');
    }).catch(() => {
        document.getElementById('gcal-auth-content').style.display = 'none';
        document.getElementById('gcal-user-display').style.display = 'block';
        document.getElementById('gcal-email-display').textContent = 'Connected';
        document.getElementById('gcal-events-panel').style.display = 'block';
        document.getElementById('gcal-import-bar').style.display = 'block';
        fetchGoogleCalendar();
    });
}

function googleLogout() {
    if (gcalAccessToken) {
        google.accounts.oauth2.revoke(gcalAccessToken);
    }
    gcalAccessToken = null; gcalEvents = [];
    document.getElementById('gcal-auth-content').style.display = 'block';
    document.getElementById('gcal-user-display').style.display = 'none';
    document.getElementById('gcal-events-panel').style.display = 'none';
    document.getElementById('gcal-import-bar').style.display = 'none';
    renderSidebarCals();
    showToast('Googleカレンダーを切断しました');
}

function fetchGoogleCalendar() {
    if (!gcalAccessToken) return;
    const base = new Date(currentDate);
    const start = new Date(base.getFullYear(), base.getMonth(), 1).toISOString();
    const end = new Date(base.getFullYear(), base.getMonth() + 1, 0, 23, 59, 59).toISOString();

    fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=' +
        encodeURIComponent(start) + '&timeMax=' + encodeURIComponent(end) +
        '&singleEvents=true&orderBy=startTime&maxResults=250', {
        headers: { Authorization: 'Bearer ' + gcalAccessToken }
    }).then(r => {
        if (!r.ok) throw new Error('API error: ' + r.status);
        return r.json();
    }).then(data => {
        gcalEvents = data.items || [];
        renderGcalSidebar();
    }).catch(e => {
        console.warn('GCal fetch error:', e);
        showToast('⚠️ カレンダー取得に失敗しました（再ログインしてください）', 3000);
    });
}

function renderGcalSidebar() {
    const list = document.getElementById('gcal-events-list');
    if (gcalEvents.length === 0) {
        list.innerHTML = '<div class="gcal-no-events">今月の予定はありません</div>';
        return;
    }
    // 日付ごとにグループ化
    const groups = {};
    gcalEvents.forEach(ev => {
        const dateStr = ev.start.date || (ev.start.dateTime ? ev.start.dateTime.split('T')[0] : '');
        if (!dateStr) return;
        if (!groups[dateStr]) groups[dateStr] = [];
        groups[dateStr].push(ev);
    });

    let html = '';
    const sortedDates = Object.keys(groups).sort();
    const weekdays = ['日','月','火','水','木','金','土'];

    sortedDates.forEach(dateStr => {
        const d = new Date(dateStr + 'T00:00:00');
        const dow = weekdays[d.getDay()];
        const isToday = dateStr === currentDate;
        html += '<div class="gcal-day-group">';
        html += '<div class="gcal-day-label" style="' + (isToday ? 'color:var(--accent);font-weight:800' : '') + '">'
            + (d.getMonth()+1) + '/' + d.getDate() + '(' + dow + ')' + (isToday ? ' ← 今日' : '') + '</div>';

        groups[dateStr].forEach(ev => {
            const isAllDay = !!ev.start.date;
            let timeStr = '';
            if (!isAllDay && ev.start.dateTime) {
                const t = new Date(ev.start.dateTime);
                timeStr = t.getHours() + ':' + String(t.getMinutes()).padStart(2, '0') + ' ';
            }
            const bgColor = ev.colorId ? getGcalColor(ev.colorId) : (isAllDay ? '#16a34a' : '#2563eb');
            html += '<div class="gcal-event" style="background:' + bgColor + '" title="' + (ev.summary || '(無題)').replace(/"/g, '&quot;') + '">'
                + timeStr + (ev.summary || '(無題)') + '</div>';
        });
        html += '</div>';
    });
    list.innerHTML = html;
}

function getGcalColor(colorId) {
    const colors = {1:'#7986cb',2:'#33b679',3:'#8e24aa',4:'#e67c73',5:'#f6bf26',6:'#f4511e',7:'#039be5',8:'#616161',9:'#3f51b5',10:'#0b8043',11:'#d50000'};
    return colors[colorId] || '#2563eb';
}

// GCal予定をタイムラインにインポート
function importGcalToTimeline() {
    if (!gcalAccessToken) { showToast('⚠️ Googleにログインしてください'); return; }
    const todayEvents = gcalEvents.filter(ev => {
        const dateStr = ev.start.date || (ev.start.dateTime ? ev.start.dateTime.split('T')[0] : '');
        return dateStr === currentDate;
    });
    if (todayEvents.length === 0) { showToast('今日のGCal予定はありません'); return; }

    let imported = 0;
    todayEvents.forEach(ev => {
        if (ev.start.date) return; // 終日イベントはスキップ
        if (!ev.start.dateTime) return;
        const start = new Date(ev.start.dateTime);
        const endDt = ev.end.dateTime ? new Date(ev.end.dateTime) : new Date(start.getTime() + 30*60000);
        const h = start.getHours(), m = Math.floor(start.getMinutes() / 5) * 5;
        const dur = Math.max(15, Math.round((endDt - start) / 60000 / 5) * 5);
        const name = ev.summary || '(GCal)';
        // 重複チェック: 同名・同時刻は追加しない
        const exists = (db[currentDate].acts || []).some(a => a.h === h && a.m === m && a.name === name);
        if (exists) return;
        if (canAddBlock(h, m, dur, -1)) {
            db[currentDate].acts.push({ h, m, duration: dur, name: '📅 ' + name, color: getGcalColor(ev.colorId) });
            imported++;
        }
    });
    if (imported > 0) {
        saveDataSilent(); refreshTimeline(); flashAutoSave();
        showToast('✅ ' + imported + '件のGCal予定をインポートしました');
    } else {
        showToast('インポート可能な予定がありませんでした');
    }
}

let firebaseReady=false,firestoreDb=null,userDocId=null,fbUnsub=null,isSyncingFromCloud=false;
function initFirebase(){
    try{
        if(FIREBASE_CONFIG.apiKey.startsWith('YOUR_')){updateSyncStatus(false);return;}
        firebase.initializeApp(FIREBASE_CONFIG);firestoreDb=firebase.firestore();firebaseReady=true;

function updateSyncStatus(on){
    const el=document.getElementById('sidebar-sync');
    if(on){el.className='sidebar-sync online';el.textContent='● Cloud同期中';}
    else{el.className='sidebar-sync offline';el.textContent='● ローカル保存';}

function startRealtimeSync(){
    if(!firebaseReady||!userDocId)return;if(fbUnsub)fbUnsub();
    fbUnsub=firestoreDb.collection('schedules').doc(userDocId).onSnapshot(doc=>{
        if(doc.exists&&!isSyncingFromCloud){
            // 入力中（フォーカス中）は再描画をスキップ
            const ae=document.activeElement;
            const isTyping=ae&&(ae.tagName==='INPUT'||ae.tagName==='TEXTAREA');
            if(isTyping)return;
            const c=doc.data();if(c.db){
            isSyncingFromCloud=true;db=JSON.parse(c.db);
            masterTodos=c.todos?JSON.parse(c.todos):masterTodos;
            localStorage.setItem('D24_DB',JSON.stringify(db));localStorage.setItem('D24_TODOS',JSON.stringify(masterTodos));
            loadDate(currentDate);setTimeout(()=>{isSyncingFromCloud=false;},500);
        }}
    },()=>updateSyncStatus(false));
}
function saveToCloud(){
    if(!firebaseReady||!userDocId||isSyncingFromCloud)return;
    firestoreDb.collection('schedules').doc(userDocId).set({
        db:JSON.stringify(db),todos:JSON.stringify(masterTodos),
        updatedAt:firebase.firestore.FieldValue.serverTimestamp()
    }).catch(()=>{});
}

function buildMiniCal(md){
    const y=md.getFullYear(),m=md.getMonth(),todayISO=new Date().toISOString().split('T')[0];
    const mN=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

    let h='<div class="mini-cal" style="margin-bottom:8px"><div class="mini-cal-header">'+y+'年 '+mN[m]+'</div><div class="mini-cal-grid">';
    dw.forEach((d,i)=>{let c='mini-cal-dow';if(i===0)c+=' sun';if(i===6)c+=' sat';h+='<div class="'+c+'">'+d+'</div>';});
    const fd=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate(),pd=new Date(y,m,0).getDate();
    for(let i=fd-1;i>=0;i--)h+='<div class="mini-cal-day other-month">'+(pd-i)+'</div>';
    for(let d=1;d<=dim;d++){
        const iso=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0'),dow=new Date(y,m,d).getDay();
        let c='mini-cal-day';if(iso===todayISO)c+=' today';if(iso===currentDate)c+=' selected';
        if(dow===0)c+=' sun-day';if(dow===6)c+=' sat-day';

        h+='<div class="'+c+'" onclick="loadDate(\''+iso+'\')">'+d+'</div>';
    }
    const tot=fd+dim,rem=tot%7;if(rem>0)for(let i=1;i<=7-rem;i++)h+='<div class="mini-cal-day other-month">'+i+'</div>';
    h+='</div></div>';return h;
}

// 重複ロジック
function getBlockRange(b){return{start:b.h*60+b.m,end:b.h*60+b.m+b.duration};}
function blocksOverlap(a,b){const ra=getBlockRange(a),rb=getBlockRange(b);return ra.start<rb.end&&rb.start<ra.end;}
function countOverlapsAtSlot(acts,s){const se=s+5;return acts.filter(a=>{const r=getBlockRange(a);return r.start<se&&s<r.end;}).length;}
function canAddBlock(h,m,dur,ex){const acts=(db[currentDate].acts||[]).filter((_,i)=>i!==ex);const ns=h*60+m,ne=ns+dur;for(let t=ns;t<ne;t+=5){if(countOverlapsAtSlot(acts,t)>=2)return false;}return true;}
function calculateLanes(acts){const lanes=new Array(acts.length).fill(-1);for(let i=0;i<acts.length;i++){for(let j=i+1;j<acts.length;j++){if(blocksOverlap(acts[i],acts[j])){const si=acts[i].h*60+acts[i].m,sj=acts[j].h*60+acts[j].m;if(si<=sj){if(lanes[i]===-1)lanes[i]=0;if(lanes[j]===-1)lanes[j]=1;}else{if(lanes[j]===-1)lanes[j]=0;if(lanes[i]===-1)lanes[i]=1;}}}}return lanes;}

function handleCellClick(h,m,cl){const acts=db[currentDate].acts||[];const cm=h*60+m;const ex=acts.filter(a=>{const r=getBlockRange(a);return r.start<=cm&&cm<r.end;});if(ex.length===0){if(!canAddBlock(h,m,15,-1)){showToast('⚠️ 重複上限');return;}db[currentDate].acts.push({h,m,duration:15,name:'新規予定',color:COLORS[3]});saveDataSilent();refreshTimeline();flashAutoSave();showToast('✅ 新規予定を追加');}else if(ex.length===1&&cl===1){if(!canAddBlock(h,m,15,-1)){showToast('⚠️ 重複上限');return;}db[currentDate].acts.push({h,m,duration:15,name:'新規予定',color:COLORS[4]});saveDataSilent();refreshTimeline();flashAutoSave();showToast('✅ ダブルワーク追加');}else if(ex.length===1&&cl===0){const idx=acts.indexOf(ex[0]);if(idx>=0)openEdit(idx);}else if(ex.length>=2){showToast('⚠️ 3つ以上は入れられません',3000);}}

// 24時台判定: 実時刻が0:00〜0:59で、表示中の日付が「昨日」なら24時台として扱う
function getEffectiveTime(){
    const now=new Date();
    let h=now.getHours(),m=now.getMinutes(),s=now.getSeconds();
    const todayISO=now.toISOString().split('T')[0];
    // 0時台の場合: 前日の24時台として扱うかチェック
    if(h===0){
        const yesterday=new Date(now);yesterday.setDate(yesterday.getDate()-1);
        const yISO=yesterday.toISOString().split('T')[0];
        if(currentDate===yISO){
            // 前日の日程を表示中 → 24時台
            return {h:24,m,s,nowSec:24*3600+m*60+s,isOnCurrentDate:true};
        }
    }
    return {h,m,s,nowSec:h*3600+m*60+s,isOnCurrentDate:(todayISO===currentDate)};
}

function updateCurrentTimeLine(){
    document.querySelectorAll('.current-time-line').forEach(el=>el.remove());
    document.querySelectorAll('.time-row.current-hour').forEach(r=>r.classList.remove('current-hour'));
    document.querySelectorAll('.cell.past-cell').forEach(c=>c.classList.remove('past-cell'));
    document.querySelectorAll('.time-row.past-row').forEach(r=>r.classList.remove('past-row'));
    const t=getEffectiveTime();
    if(!t.isOnCurrentDate)return;// 表示中の日付と無関係なら何もしない
    const h=t.h,m=t.m,s=t.s;
    // 赤ピン配置
    const row=document.querySelector('.time-row[data-h="'+h+'"]');
    if(row){row.classList.add('current-hour');const cs=row.querySelector('.minute-cells');if(cs){const ln=document.createElement('div');ln.className='current-time-line';ln.style.left=((m*60+s)/3600*100)+'%';cs.appendChild(ln);
        cs.querySelectorAll('.cell').forEach(c=>{const cm=parseInt(c.dataset.m);if(cm+5<=m)c.classList.add('past-cell');});
    }}
    // 過去の行全体をグレーアウト
    document.querySelectorAll('.time-row[data-h]').forEach(r=>{const rh=parseInt(r.dataset.h);if(rh<h)r.classList.add('past-row');});
}


function refreshTimeline(){document.querySelectorAll('.act-block').forEach(b=>b.remove());const acts=db[currentDate].acts||[];const lanes=calculateLanes(acts);acts.forEach((a,idx)=>{const lane=lanes[idx];let rem=a.duration,curH=a.h,curM=a.m;while(rem>0&&curH<=24){const rc=document.querySelector('.time-row[data-h="'+curH+'"] .minute-cells');if(!rc)break;let dur=Math.min(rem,60-curM);const dv=document.createElement('div');dv.className='act-block';dv.draggable=true;dv.style.left=(curM/60*100)+'%';dv.style.width=(dur/60*100)+'%';dv.style.backgroundColor=a.color;dv.innerText=(curM===a.m)?(a.reminder&&a.reminder.enabled?'🔔 ':'')+a.name:'';if(lane===-1){dv.style.height='54px';dv.style.top='2px';}else if(lane===0){dv.style.height='27px';dv.style.top='1px';}else{dv.style.height='27px';dv.style.top='31px';}dv.onclick=e=>{e.stopPropagation();openEdit(idx);};dv.ondragstart=()=>{dragInfo={type:'move',index:idx,data:a};};rc.appendChild(dv);rem-=dur;curH++;curM=0;}});updateCurrentTimeLine();}

function handleDrop(h,m,ln){if(!dragInfo)return;const dur=dragInfo.type==='move'?dragInfo.data.duration:dragInfo.mins;const nm=dragInfo.type==='move'?dragInfo.data.name:dragInfo.name;const cl=dragInfo.type==='move'?dragInfo.data.color:dragInfo.color;const ex=dragInfo.type==='move'?dragInfo.index:-1;if(!canAddBlock(h,m,dur,ex)){showToast('⚠️ 配置不可');dragInfo=null;return;}if(dragInfo.type==='move')db[currentDate].acts.splice(dragInfo.index,1);db[currentDate].acts.push({h,m,duration:dur,name:nm,color:cl});saveDataSilent();refreshTimeline();flashAutoSave();dragInfo=null;}

function renderWeeklyView(){
    const ui=document.getElementById('weekly-ui');
    const base=new Date(currentDate);
    const dayOfWeek=base.getDay();
    const monday=new Date(base);monday.setDate(base.getDate()-(dayOfWeek===0?6:dayOfWeek-1));
    const todayISO=new Date().toISOString().split('T')[0];
    const days=[];for(let i=0;i<7;i++){const d=new Date(monday);d.setDate(monday.getDate()+i);days.push(d.toISOString().split('T')[0]);}
    const dNames=['月','火','水','木','金','土','日'];
    const hours=[];for(let h=5;h<=24;h++)hours.push(h);

    let html='<div class="weekly-grid" style="grid-template-rows:auto repeat('+hours.length+',28px)">';
    // Header
    html+='<div class="weekly-hour-label" style="border-bottom:2px solid var(--border)"></div>';
    days.forEach((iso,i)=>{
        const d=new Date(iso+'T00:00:00');const isToday=iso===todayISO;const isSel=iso===currentDate;
        let cls='weekly-day-header';if(isToday)cls+=' today-col';
        let style=isSel?'outline:2px solid var(--accent);outline-offset:-2px;border-radius:6px 6px 0 0;':'';
        html+='<div class="'+cls+'" style="'+style+'cursor:pointer" onclick="loadDate(\''+iso+'\');switchView(\'daily\')">'
            +dNames[i]+'<br><span style="font-size:13px">'+(d.getMonth()+1)+'/'+d.getDate()+'</span></div>';
    });
    // Grid
    hours.forEach(h=>{
        html+='<div class="weekly-hour-label">'+(h===24?'0':h)+'</div>';
        days.forEach(iso=>{
            const isToday=iso===todayISO;
            html+='<div class="weekly-cell'+(isToday?' today-col':'')+'" data-wiso="'+iso+'" data-wh="'+h+'"></div>';
        });
    });
    html+='</div>';
    ui.innerHTML=html;

    // Place blocks
    days.forEach(iso=>{
        const dayData=db[iso];if(!dayData||!dayData.acts)return;
        dayData.acts.forEach(a=>{
            const startH=a.h;const startM=a.m;
            hours.forEach((h,hi)=>{
                if(h!==startH)return;
                const cell=ui.querySelector('.weekly-cell[data-wiso="'+iso+'"][data-wh="'+h+'"]');
                if(!cell)return;
                const topPx=(startM/60)*28;
                const heightPx=Math.max(4,Math.min((a.duration/60)*28,28*4));
                const blk=document.createElement('div');blk.className='weekly-block';
                blk.style.top=topPx+'px';blk.style.height=heightPx+'px';
                blk.style.backgroundColor=a.color;blk.textContent=a.name;
                blk.title=h+':'+String(a.m).padStart(2,'0')+' '+a.name+' ('+a.duration+'分)';
                blk.onclick=()=>{loadDate(iso);switchView('daily');};
                cell.appendChild(blk);
            });
        });
    });
}

let templates=JSON.parse(localStorage.getItem('D24_TEMPLATES'))||[];

function renderTemplates(){
    const grid=document.getElementById('tpl-grid');grid.innerHTML='';

        if(t&&t.name){

            card.innerHTML='<span>'+t.name+'</span><span class="tpl-dur">'+t.duration+'分</span>';
            card.draggable=true;
            card.title=t.name+' ('+t.duration+'分) — ドラッグでタイムラインへ配置、右クリックで削除';
            card.ondragstart=()=>{dragInfo={type:'new',name:t.name,mins:t.duration,color:t.color};};
            card.oncontextmenu=(e)=>{e.preventDefault();if(confirm('「'+t.name+'」を削除しますか？')){templates[i]=null;localStorage.setItem('D24_TEMPLATES',JSON.stringify(templates));renderTemplates();showToast('🗑 テンプレート削除');}};

// Web Audio API — 3種類のアラーム音生成
let audioCtx=null;
function getAudioCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}

function playAlarmSound(type){
    const ctx=getAudioCtx();
    let playing=true;
    if(type==='alarm1'){
        const beep=()=>{if(!playing)return;const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=880;o.type='square';g.gain.value=0.15;o.start();o.stop(ctx.currentTime+0.15);setTimeout(()=>{if(playing)beep();},350);};
        beep();
    }else if(type==='alarm2'){
        const chime=()=>{if(!playing)return;[523,659,784].forEach((f,i)=>{const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=f;o.type='sine';g.gain.value=0.12;o.start(ctx.currentTime+i*0.12);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.12+0.8);o.stop(ctx.currentTime+i*0.12+0.8);});setTimeout(()=>{if(playing)chime();},1500);};
        chime();
    }else if(type==='alarm3'){
        const pulse=()=>{if(!playing)return;const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=220;o.type='triangle';g.gain.value=0.2;o.start();g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.2);o.stop(ctx.currentTime+0.2);setTimeout(()=>{if(!playing)return;const o2=ctx.createOscillator();const g2=ctx.createGain();o2.connect(g2);g2.connect(ctx.destination);o2.frequency.value=220;o2.type='triangle';g2.gain.value=0.2;o2.start();g2.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.2);o2.stop(ctx.currentTime+0.2);},250);setTimeout(()=>{if(playing)pulse();},1200);};
        pulse();
    }else if(type==='heal1'){
        // 波の音: ホワイトノイズ+LFO
        const bufSize=ctx.sampleRate*2;const buf=ctx.createBuffer(1,bufSize,ctx.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<bufSize;i++)d[i]=(Math.random()*2-1)*0.3;
        const loop=()=>{if(!playing)return;const src=ctx.createBufferSource();src.buffer=buf;const g=ctx.createGain();const lfo=ctx.createOscillator();const lfoG=ctx.createGain();lfo.frequency.value=0.25;lfo.connect(lfoG);lfoG.gain.value=0.06;lfoG.connect(g.gain);src.connect(g);g.connect(ctx.destination);g.gain.value=0.08;src.start();src.stop(ctx.currentTime+4);setTimeout(()=>{if(playing)loop();},3800);};
        loop();
    }else if(type==='heal2'){
        // オルゴール: 高音メロディ
        const notes=[784,880,1047,880,784,659,784,1047];let ni=0;
        const play=()=>{if(!playing)return;const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=notes[ni%notes.length];o.type='sine';g.gain.value=0.1;o.start();g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.6);o.stop(ctx.currentTime+0.6);ni++;setTimeout(()=>{if(playing)play();},500);};
        play();
    }else if(type==='heal3'){
        // 風鈴: ランダム高音+残響
        const freqs=[1319,1568,1760,2093,2349];
        const ring=()=>{if(!playing)return;const f=freqs[Math.floor(Math.random()*freqs.length)];const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=f;o.type='sine';g.gain.value=0.08;o.start();g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+1.8);o.stop(ctx.currentTime+1.8);setTimeout(()=>{if(playing)ring();},800+Math.random()*1200);};
        ring();
    }else if(type==='bell1'){
        // 教会の鐘: 低音の重厚な響き
        const toll=()=>{if(!playing)return;[174,220,262].forEach((f,i)=>{const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=f;o.type='sine';g.gain.value=0.1;o.start(ctx.currentTime+i*0.05);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+2.5);o.stop(ctx.currentTime+2.5);});setTimeout(()=>{if(playing)toll();},3000);};
        toll();
    }else if(type==='bell2'){
        // マリンバ: 木琴風のリズミカルな音
        const notes=[392,440,494,523,587,523,494,440];let ni=0;
        const hit=()=>{if(!playing)return;const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=notes[ni%notes.length];o.type='triangle';g.gain.value=0.15;o.start();g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.35);o.stop(ctx.currentTime+0.35);ni++;setTimeout(()=>{if(playing)hit();},400);};
        hit();
    }else if(type==='bell3'){
        // クリスタル: きらめくハイトーン
        const sparkle=()=>{if(!playing)return;const f=2000+Math.random()*2000;const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=f;o.type='sine';g.gain.value=0.06;o.start();g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.8);o.stop(ctx.currentTime+0.8);setTimeout(()=>{if(playing)sparkle();},300+Math.random()*400);};
        sparkle();
    }else if(type==='gen1'){
        // ファンファーレ: 上昇音階の金管風
        const notes=[262,330,392,523,659,784];let ni=0;
        const fanfare=()=>{if(!playing)return;if(ni<notes.length){const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=notes[ni];o.type='sawtooth';g.gain.value=0.08;o.start();g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.4);o.stop(ctx.currentTime+0.4);ni++;setTimeout(()=>{if(playing)fanfare();},200);}else{ni=0;setTimeout(()=>{if(playing)fanfare();},1500);}};
        fanfare();
    }else if(type==='gen2'){
        // デスクベル: カン！という短い金属音の繰り返し
        const ding=()=>{if(!playing)return;const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=1200;o.type='sine';g.gain.value=0.18;o.start();g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.5);o.stop(ctx.currentTime+0.5);const o2=ctx.createOscillator();const g2=ctx.createGain();o2.connect(g2);g2.connect(ctx.destination);o2.frequency.value=3600;o2.type='sine';g2.gain.value=0.04;o2.start();g2.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.15);o2.stop(ctx.currentTime+0.15);setTimeout(()=>{if(playing)ding();},2000);};
        ding();
    }else if(type==='gen3'){
        // ハープ: アルペジオの優雅な音色
        const harpNotes=[262,330,392,494,587,659,784,880];let hi=0;
        const strum=()=>{if(!playing)return;hi=0;const playNote=()=>{if(!playing||hi>=harpNotes.length)return;const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=harpNotes[hi];o.type='sine';g.gain.value=0.09;o.start();g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+1.5);o.stop(ctx.currentTime+1.5);hi++;setTimeout(()=>playNote(),120);};playNote();setTimeout(()=>{if(playing)strum();},3000);};
        strum();
    }
    return ()=>{playing=false;};
}

// アラームチェッカー（3秒ごと — ラグ最小化）
function startAlarmChecker(){setInterval(checkAlarms,3000);}

function checkAlarms(){
    const t=getEffectiveTime();
    if(!t.isOnCurrentDate)return;
    const data=db[currentDate];if(!data||!data.acts)return;
    const nowSec=t.nowSec;

    data.acts.forEach(a=>{
        if(!a.reminder||!a.reminder.enabled)return;
        const rm=a.reminder;
        const startSec=(a.h*60+a.m)*60;
        const endSec=startSec+a.duration*60;
        const halfSec=startSec+Math.floor(a.duration*60/2);
        const fiveBeforeEndSec=endSec-300;
        const timeStr=a.h+':'+String(a.m).padStart(2,'0');
        const bodyStr='予定「'+a.name+'」';

        // 重複判定: 残り半分と残り5分が同タイミング（差10秒以内）かチェック
        const halfFiveOverlap=rm.halfEnabled&&rm.fiveEnabled&&Math.abs(halfSec-fiveBeforeEndSec)<10;

        // ① 開始前通知
        if(rm.preEnabled&&!rm.firedPre){
            const preSec=startSec-rm.preBefore*60;
            if(nowSec>=preSec&&nowSec<startSec){
                rm.firedPre=true;
                showAlarmPopup('⏰ 開始前通知',timeStr+' 開始',bodyStr,'あと'+rm.preBefore+'分で開始します','⏰','warn',rm.sound);
                saveDataSilent();
            }
        }
        // ② 開始時通知
        if(!rm.firedStart&&nowSec>=startSec&&nowSec<startSec+10){
            rm.firedStart=true;
            showAlarmPopup('🔔 リマインダーアラーム',timeStr+' 開始',bodyStr,'予定の時刻になりました','🔔','',rm.sound);
            saveDataSilent();
        }
        // ③-A 残り半分 & ③-B 残り5分（重複統合処理）
        if(halfFiveOverlap){
            // 重複: 1回にまとめる
            if(!rm.firedHalf&&!rm.firedFive&&a.duration>=6){
                if(nowSec>=halfSec&&nowSec<halfSec+10){
                    rm.firedHalf=true;rm.firedFive=true;
                    const remLeftSec=endSec-nowSec;const remMin=Math.floor(remLeftSec/60);const remS=remLeftSec%60;
                    const remStr=remS>0?remMin+'分'+remS+'秒':remMin+'分';
                    showAlarmPopup('⏳ 残り5分（折り返し地点）',timeStr+' の予定',bodyStr,'残り'+remStr+'です','⏳','warn',rm.sound);
                    saveDataSilent();
                }
            }
        }else{
            // ③-A 残り半分（単独）
            if(rm.halfEnabled&&!rm.firedHalf&&a.duration>=6){
                if(nowSec>=halfSec&&nowSec<halfSec+10){
                    rm.firedHalf=true;
                    const remLeftSec=endSec-nowSec;const remMin=Math.floor(remLeftSec/60);const remS=remLeftSec%60;
                    const remStr=remS>0?remMin+'分'+remS+'秒':remMin+'分';
                    showAlarmPopup('⏳ 残り半分',timeStr+' の予定',bodyStr,'残り'+remStr+'です','⏳','warn',rm.sound);
                    saveDataSilent();
                }
            }
            // ③-B 残り5分（単独）
            if(rm.fiveEnabled&&!rm.firedFive&&a.duration>5){
                if(nowSec>=fiveBeforeEndSec&&nowSec<fiveBeforeEndSec+10){
                    rm.firedFive=true;
                    showAlarmPopup('🚨 残り5分',timeStr+' の予定',bodyStr,'残り5分です！','🚨','danger',rm.sound);
                    saveDataSilent();
                }
            }
        }
        // ④ 終了時通知
        if(rm.endEnabled&&!rm.firedEnd){
            if(nowSec>=endSec&&nowSec<endSec+10){
                rm.firedEnd=true;
                const endH=Math.floor(endSec/3600);const endM=Math.floor((endSec%3600)/60);
                const endStr=endH+':'+String(endM).padStart(2,'0');
                showAlarmPopup('🎉 お疲れさまでした！',endStr+' 終了',bodyStr,'予定の時間が終了しました','🎉','',rm.sound);
                saveDataSilent();
            }
        }
    });
}
</script>
</body>
